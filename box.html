<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css box model</title>
    <style>
        *{padding:0;
        margin:0;
         box-sizing:border-box;}
       
       h1{border:100px solid rgb(5, 250, 18);
       padding:10px;
       border-radius: 100px;
       border-top-color:rgba(22, 22, 247, 0.788);
       border-bottom-style:double;
       
       }
        </style>
</head>
<body>
    <h1>Learn from yesterday,live for today,hope for tomorrow</h1>
    
</body>
</html>
