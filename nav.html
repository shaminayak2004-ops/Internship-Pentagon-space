<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav tab</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
        }
        nav{
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: gold;
        }
        #logoblock, #menublock{
            height:100px;
            width: 400px;
            display:flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #menublock a{
            color:black;
            text-decoration: none;
        }
        #logoblock img{
            height:50px;
            mix-blend-mode:multiply;
        }
    </style>
</head>
<body>
    <nav>
        <div id="logoblock">
         <img src="https://www.freepnglogos.com/uploads/apple-music-logo-hd-png-10.png" alt="">
        </div>
        <div id="menublock" style="width: 600px">
            <a href="">HOME</a>
            <a href="">About</a>
            <a href="">CONTACT</a>
            <a href="">LOGIN</a>
        </div>   
    </nav>
</body>
</html>
