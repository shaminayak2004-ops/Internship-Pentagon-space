<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h2 align="center">STUDENT REGISTRATION FORM</h2>

    <form>
        <table border="1" cellpadding="8">
            <tr>
                <td>Full Name</td>
                <td><input type="text" name="fullname" maxlength="30" placeholder="Enter your full name"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td>
                    <select name="day">
                        <option>Day</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                    </select>

                    <select name="month">
                        <option>January</option>
                        <option>February</option>
                        <option>March</option>
                    </select>

                    <select name="year">
                        <option>2020</option>
                        <option>2021</option>
                        <option>2022</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>
            <tr>
                <td>Email ID</td>
                <td><input type="email" name="email"></td>
            </tr>
            <tr>
                <td>Mobile No</td>
                <td><input type="tel" name="mobile" maxlength="10"></td>
            </tr>
           <tr>
                <td>Address</td>
                <td><textarea name="address" rows="4" cols="30"></textarea></td>
            </tr>
            <tr>
                <td>City</td>
                <td><input type="text" name="city"></td>
            </tr>
            <tr>
                <td>Pincode</td>
                <td><input type="text" name="pincode" maxlength="6"></td>
            </tr>
            <tr>
                <td>State</td>
                <td><input type="text" name="state"></td>
            </tr>
            <tr>
                <td>Country</td>
                <td><input type="text" name="country"></td>
            </tr>
            <tr>
                <td>Hobbies</td>
                <td>
                    <input type="checkbox" name="hobbies"> Drawing
                    <input type="checkbox" name="hobbies"> Singing
                    <input type="checkbox" name="hobbies"> Dancing
                    <input type="checkbox" name="hobbies"> Other
                </td>
            </tr>
            <tr>
                <td>Qualification</td>
                <td>
                    <table border="1" cellpadding="5">
                        <tr>
                            <th>Sl.No</th>
                            <th>Examination</th>
                            <th>Board</th>
                            <th>Percentage</th>
                            <th>Year of Pass</th>
                        </tr>
                        <tr>
                            <td>1</td>
                            <td>Class X</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Class XII</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Graduation</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>Courses Applied For</td>
                <td>
                    <input type="radio" name="course"> BCA
                    <input type="radio" name="course"> B.Com
                    <input type="radio" name="course"> B.Sc
                    <input type="radio" name="course"> B.A
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
