<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
    <style>
        #parent{
            background-color: purple;
            height: 100px;
            width:250px;
            border:10px solid yellow;
            border-radius: 70px;
            transition: all 0.6s;
            
            
        }
        #parent:hover{
            /* transition: all 0.6s;
            transition-timing-function: linear; */
            /* transform: translateX(50px); */
            width: 200px;
            background-color: aqua;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div id="parent"></div>
    
</body>
</html>
